<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Browser Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>🐍 Snake</h1>
    <div class="hud">
      <span>Score: <strong id="score">0</strong></span>
      <span>Highscore: <strong id="highscore">0</strong></span>
    </div>

    <canvas id="game" width="400" height="400" aria-label="Snake Spielfeld"></canvas>

    <div class="controls">
      <button id="startBtn">Start / Restart</button>
      <p>Steuerung: Pfeiltasten oder WASD</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
